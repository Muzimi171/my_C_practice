<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍳 My Recipe Collection</h1>
            <p class="subtitle">Organize and manage your favorite recipes</p>
        </header>

        <div class="input-section">
            <h2>Add a New Recipe</h2>
            <form id="recipeForm">
                <div class="form-group">
                    <label for="recipeName">Recipe Name</label>
                    <input 
                        type="text" 
                        id="recipeName" 
                        placeholder="e.g., Chocolate Chip Cookies"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="recipeDescription">Description</label>
                    <textarea 
                        id="recipeDescription" 
                        placeholder="e.g., Delicious homemade cookies with chocolate chips"
                        rows="3"
                        required
                    ></textarea>
                </div>
                <button type="submit" class="btn-add">Add Recipe</button>
            </form>
        </div>

        <div class="recipe-section">
            <h2>Your Recipes</h2>
            <div id="recipeList" class="recipe-list">
                <!-- Recipes will be displayed here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
